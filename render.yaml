services:
  - type: web
    name: pos-system
    runtime: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=${PORT}
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://pos-system.onrender.com
      - key: APP_KEY
        value: your-app-key-here  # Replace with actual key
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_DRIVER
        value: database

databases:
  - name: pos-db
    plan: free
